user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_user_agent"';

    access_log  /var/log/subscribe/access.log  main;
    error_log   /var/log/subscribe/error.log   warn;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 云IP识别 + UA规则 + 速率限制（由 update_cloud_geo.sh 生成）
    include /etc/nginx/subscribe/cloud_geo.conf;

    # 白名单geo块（由 reload_whitelist.sh 生成）
    include /etc/nginx/subscribe/whitelist.conf;

    server {
        listen 80 default_server;
        return 444;
    }

    server {
        listen 443 ssl http2 default_server;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        error_page 497 =444 @blackhole;
        location @blackhole { return 444; }

        # 黑名单（deny规则，由admin实时写入）
        include /etc/nginx/subscribe/blacklist.conf;

        # 订阅拦截规则
        include /etc/nginx/subscribe/protect.conf;

        location / { return 444; }
    }
}
