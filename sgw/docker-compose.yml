version: '3.8'

services:
  gateway:
    build: ./gateway
    container_name: subscribe-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "${GATEWAY_PORT:-443}:443"
    environment:
      - V2B_BACKEND=${V2B_BACKEND}
      - V2B_HOST=${V2B_HOST}
      - SUBSCRIBE_PATH=${SUBSCRIBE_PATH:-/api/v1/client/subscribe}
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - gw_config:/etc/nginx/subscribe
      - gw_logs:/var/log/subscribe

  admin:
    build: ./admin
    container_name: subscribe-admin
    restart: unless-stopped
    ports:
      - "64444:64444"
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS}
      - ADMIN_SECRET_PATH=${ADMIN_SECRET_PATH}
      - GATEWAY_CONTAINER=subscribe-gateway
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - gw_config:/etc/nginx/subscribe
      - gw_logs:/var/log/subscribe
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  gw_config:
  gw_logs:
